<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문채의 OMR 마법사 (GitHub Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('gas_api_url') || ''); // API 주소 저장
            const [formUrl, setFormUrl] = useState('');
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [isPdf, setIsPdf] = useState(false);
            const [status, setStatus] = useState('idle');
            const [extractedAnswers, setExtractedAnswers] = useState([]);
            const [errorMessage, setErrorMessage] = useState('');
            const [logs, setLogs] = useState([]);

            const apiKey = ""; // 실행 환경에서 자동 제공

            const SYSTEM_PROMPT = `
                당신은 수학 시험 정답지를 분석하는 전문가입니다. 
                파일(PDF 또는 이미지)에서 '빠른 정답' 표를 찾아 정답과 문채 선생님의 배점 규칙을 적용하여 추출하세요.
                [규칙] 1~20번 객관식, 21~25번 주관식(숫자만). 
                [배점] 1~5(3점), 6~18(4점), 19~20(5점), 21~22(4점), 23~25(5점).
                JSON 형식: {"answers": [{"no": 1, "ans": "3", "type": "CHOICE", "point": 3}, ...]}
            `;

            const addLog = (msg) => setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 15)]);

            // API 주소 저장 로직
            useEffect(() => {
                localStorage.setItem('gas_api_url', gasUrl);
            }, [gasUrl]);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    setIsPdf(selectedFile.type === 'application/pdf');
                    const reader = new FileReader();
                    reader.onloadend = () => setPreview(reader.result);
                    reader.readAsDataURL(selectedFile);
                }
            };

            const startScan = async () => {
                if (!file) return setErrorMessage('파일을 업로드해주세요.');
                setStatus('scanning');
                addLog('AI 분석 엔진 가동 중...');

                try {
                    const base64Data = preview.split(',')[1];
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "정답과 배점을 추출해줘." },
                                    { inlineData: { mimeType: isPdf ? 'application/pdf' : file.type, data: base64Data } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        setExtractedAnswers(JSON.parse(text).answers);
                        setStatus('confirming');
                        addLog('정답지 분석 완료! 결과를 확인하세요.');
                    }
                } catch (err) {
                    setErrorMessage('분석 실패. 파일 상태를 확인하세요.');
                    setStatus('error');
                }
            };

            const applyToForm = async () => {
                if (!gasUrl) return setErrorMessage('설정에서 앱 스크립트 API 주소를 입력해주세요.');
                if (!formUrl) return setErrorMessage('설문지 주소를 입력해주세요.');

                setStatus('applying');
                addLog('구글 클라우드로 정답 전송 중...');

                try {
                    // 깃허브(외부)에서 앱 스크립트 호출 (POST 방식)
                    const response = await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors', // CORS 정책 우회 (GAS 전용)
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            formUrl: formUrl,
                            answers: extractedAnswers
                        })
                    });

                    // no-cors 모드에서는 응답 확인이 제한되므로 성공 가정 또는 타임아웃 처리
                    setTimeout(() => {
                        setStatus('success');
                        addLog('마법 완료! 설문지를 확인해보세요.');
                    }, 2500);
                } catch (err) {
                    setErrorMessage('전송 실패: ' + err.message);
                    setStatus('error');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 max-w-6xl mx-auto space-y-8">
                    {/* 상단바: 깃허브 스타일 */}
                    <nav className="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                <i data-lucide="wand-2"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight">OMR MAGICIAN</h1>
                                <p className="text-xs font-bold text-indigo-500 uppercase tracking-widest">GitHub Repository Project</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                            <i data-lucide="link-2" className="w-4 h-4 text-slate-400 ml-2"></i>
                            <input 
                                type="text" 
                                placeholder="앱 스크립트 배포 URL 입력"
                                className="bg-transparent outline-none text-xs w-64 p-2 font-medium"
                                value={gasUrl}
                                onChange={(e) => setGasUrl(e.target.value)}
                            />
                        </div>
                    </nav>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* 왼쪽: 컨트롤 패널 */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                                <section className="space-y-4">
                                    <h3 className="text-sm font-black text-slate-400 uppercase tracking-wider flex items-center gap-2">
                                        <i data-lucide="settings-2" className="w-4 h-4"></i> Step 1. 목표 설정
                                    </h3>
                                    <input 
                                        type="text" 
                                        placeholder="구글 설문지 편집 URL을 입력하세요"
                                        className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-sm font-medium"
                                        value={formUrl}
                                        onChange={(e) => setFormUrl(e.target.value)}
                                    />
                                </section>

                                <section className="space-y-4">
                                    <h3 className="text-sm font-black text-slate-400 uppercase tracking-wider flex items-center gap-2">
                                        <i data-lucide="file-up" className="w-4 h-4"></i> Step 2. 파일 업로드 (PDF 권장)
                                    </h3>
                                    <div 
                                        onClick={() => document.getElementById('fileInput').click()}
                                        className={`group border-3 border-dashed rounded-[2rem] p-10 flex flex-col items-center justify-center cursor-pointer transition-all ${preview ? 'bg-indigo-50/50 border-indigo-200' : 'bg-slate-50 border-slate-200 hover:border-indigo-300'}`}
                                    >
                                        <input id="fileInput" type="file" className="hidden" accept=".pdf,image/*" onChange={handleFileChange} />
                                        {preview ? (
                                            <div className="text-center animate-in fade-in zoom-in duration-300">
                                                <i data-lucide={isPdf ? "file-check" : "image"} className={`w-16 h-16 mx-auto mb-4 ${isPdf ? 'text-rose-500' : 'text-indigo-500'}`}></i>
                                                <p className="font-bold text-slate-700 text-sm">{file.name}</p>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                                                    <i data-lucide="plus" className="text-slate-300"></i>
                                                </div>
                                                <p className="text-sm text-slate-400 font-bold">정답지 파일을 선택하세요</p>
                                            </>
                                        )}
                                    </div>
                                </section>

                                <button 
                                    onClick={startScan}
                                    disabled={status === 'scanning' || !file}
                                    className="w-full py-5 bg-slate-900 hover:bg-black text-white rounded-2xl font-bold flex items-center justify-center gap-3 transition-all disabled:bg-slate-200 disabled:text-slate-400 shadow-xl shadow-slate-200"
                                >
                                    {status === 'scanning' ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="zap" className="w-5 h-5 fill-current"></i>}
                                    AI 정답 분석하기
                                </button>
                            </div>

                            {/* 상태 로그 */}
                            <div className="bg-slate-900 rounded-[2rem] p-6 text-emerald-400 font-mono text-[11px] shadow-2xl">
                                <div className="flex items-center gap-2 mb-4 border-b border-slate-800 pb-3">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                                    <span className="text-slate-500 font-bold uppercase tracking-tighter">Terminal Status</span>
                                </div>
                                <div className="h-32 overflow-y-auto space-y-2 custom-scrollbar">
                                    {logs.length === 0 ? <p className="opacity-40">시스템 대기 중...</p> : logs.map((log, i) => <p key={i} className="leading-relaxed">{log}</p>)}
                                </div>
                            </div>
                        </div>

                        {/* 오른쪽: 결과 프리뷰 */}
                        <div className="lg:col-span-7 bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 flex flex-col min-h-[600px]">
                            <div className="flex items-center justify-between mb-8">
                                <h2 className="text-xl font-black text-slate-800 flex items-center gap-3">
                                    스캔 데이터 프리뷰
                                    {extractedAnswers.length > 0 && <span className="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-xs font-black">{extractedAnswers.length} 문항</span>}
                                </h2>
                                {status === 'confirming' && <div className="animate-pulse text-xs font-bold text-indigo-500">데이터 확인 필요</div>}
                            </div>

                            <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar mb-8">
                                {extractedAnswers.length > 0 ? (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        {extractedAnswers.map((item) => (
                                            <div key={item.no} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-indigo-200 transition-all group">
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-[10px] font-black text-slate-400 uppercase">{item.no}번</span>
                                                    <span className="text-[10px] font-bold text-indigo-500">{item.point}점</span>
                                                </div>
                                                <div className="text-lg font-black text-slate-800 group-hover:text-indigo-600 transition-colors">
                                                    {item.ans}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4">
                                        <div className="w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center">
                                            <i data-lucide="database" className="w-10 h-10 opacity-20"></i>
                                        </div>
                                        <p className="font-bold text-sm">추출된 데이터가 없습니다.</p>
                                    </div>
                                )}
                            </div>

                            {status === 'confirming' && (
                                <button 
                                    onClick={applyToForm}
                                    className="w-full py-6 bg-emerald-500 hover:bg-emerald-600 text-white rounded-[1.5rem] font-black text-xl shadow-xl shadow-emerald-100 flex items-center justify-center gap-3 transition-all active:scale-95"
                                >
                                    <i data-lucide="send" className="w-6 h-6"></i>
                                    구글 설문지에 정답 쏘기!
                                </button>
                            )}

                            {status === 'success' && (
                                <div className="p-8 bg-emerald-50 text-emerald-700 rounded-[2rem] border-2 border-emerald-100 text-center animate-in fade-in slide-in-from-bottom-4 duration-500">
                                    <i data-lucide="check-circle" className="w-16 h-16 mx-auto mb-4"></i>
                                    <h4 className="text-2xl font-black mb-1">입력 완료!</h4>
                                    <p className="font-bold opacity-70 italic text-sm">문채 선생님, 오늘 퇴근은 평소보다 빠르겠네요!</p>
                                </div>
                            )}

                            {status === 'error' && (
                                <div className="p-6 bg-rose-50 text-rose-600 rounded-[1.5rem] border-2 border-rose-100 text-center space-y-3">
                                    <i data-lucide="info" className="w-8 h-8 mx-auto"></i>
                                    <p className="font-bold text-sm">{errorMessage}</p>
                                    <button onClick={() => setStatus('idle')} className="text-xs font-black underline">새로고침</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
