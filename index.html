<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문채의 OMR 마법사 V2 - 지능형 자동화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.025em; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .drop-zone-active { border-color: #4f46e5; background-color: #f5f3ff; transform: scale(1.02); }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const App = () => {
            // 설정 상태
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('gas_api_url') || '');
            const [formUrl, setFormUrl] = useState('');
            const [choiceCount, setChoiceCount] = useState(20);
            const [textCount, setTextCount] = useState(5);
            
            // 파일 상태
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [isPdf, setIsPdf] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            
            // 프로세스 상태
            const [status, setStatus] = useState('idle');
            const [extractedAnswers, setExtractedAnswers] = useState([]);
            const [errorMessage, setErrorMessage] = useState('');
            const [logs, setLogs] = useState([]);

            const apiKey = ""; // 시스템에서 자동 제공

            const addLog = (msg) => setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 15)]);

            // API 주소 자동 저장
            useEffect(() => {
                localStorage.setItem('gas_api_url', gasUrl);
            }, [gasUrl]);

            // 파일 처리 로직
            const processFile = (selectedFile) => {
                if (!selectedFile) return;
                
                setStatus('idle');
                setErrorMessage('');
                setFile(selectedFile);
                setIsPdf(selectedFile.type === 'application/pdf');
                
                const reader = new FileReader();
                reader.onloadstart = () => addLog('파일 읽기 시작...');
                reader.onloadend = () => {
                    setPreview(reader.result);
                    addLog('파일 로드 완료. 분석 준비되었습니다.');
                };
                reader.onerror = () => setErrorMessage('파일을 읽는 중에 오류가 발생했습니다.');
                reader.readAsDataURL(selectedFile);
            };

            // 드래그 앤 드롭 핸들러
            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === 'dragenter' || e.type === 'dragover') setIsDragging(true);
                else if (e.type === 'dragleave') setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                const droppedFile = e.dataTransfer.files[0];
                processFile(droppedFile);
            };

            // AI 분석 실행
            const startScan = async () => {
                if (!file || !preview) return setErrorMessage('분석할 파일을 먼저 업로드해주세요.');
                
                setStatus('scanning');
                addLog(`지능형 엔진 가동: 객관식 ${choiceCount}문항, 주관식 ${textCount}문항 분석 중...`);

                const DYNAMIC_PROMPT = `
                    당신은 수학 정답지 분석 전문가입니다. 이미지 또는 PDF에서 '빠른 정답' 표를 찾아 데이터를 추출하세요.
                    
                    [추출 조건]
                    1. 객관식 총 문항 수: ${choiceCount}개 (1번부터 ${choiceCount}번까지)
                    2. 주관식 총 문항 수: ${textCount}개 (${choiceCount + 1}번부터 ${choiceCount + textCount}번까지)
                    3. 주관식 답안 가공: 단위(cm, 년, 개 등)를 모두 제거하고 숫자만 추출하세요. (예: "30년 후" -> "30")
                    
                    [배점 규칙]
                    전체 점수의 합계가 반드시 '100점'이 되도록 배점을 자동 계산하여 할당하세요.
                    - 문항 수가 많을 경우 3~5점 사이로 적절히 분배하세요.
                    - 가급적 정수 점수를 사용하세요.
                    
                    반드시 아래 JSON 형식으로만 응답하세요:
                    {
                      "answers": [
                        {"no": 1, "ans": "3", "type": "CHOICE", "point": 4},
                        ...
                      ]
                    }
                `;

                try {
                    const base64Data = preview.split(',')[1];
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "이 정답지에서 데이터를 추출해줘." },
                                    { inlineData: { mimeType: isPdf ? 'application/pdf' : file.type, data: base64Data } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: DYNAMIC_PROMPT }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        const parsed = JSON.parse(text);
                        setExtractedAnswers(parsed.answers);
                        setStatus('confirming');
                        addLog(`분석 성공! 총 ${parsed.answers.length}개 문항을 찾았습니다.`);
                    } else {
                        throw new Error('AI 응답이 비어있습니다.');
                    }
                } catch (err) {
                    addLog('오류 발생: ' + err.message);
                    setErrorMessage('분석에 실패했습니다. 파일이 너무 크거나 형식이 맞지 않을 수 있습니다.');
                    setStatus('error');
                }
            };

            // 구글 설문지로 전송
            const applyToForm = async () => {
                if (!gasUrl) return setErrorMessage('설정에서 앱 스크립트 배포 URL을 입력해주세요.');
                if (!formUrl) return setErrorMessage('설문지 주소를 입력해주세요.');

                setStatus('applying');
                addLog('구글 설문지로 데이터를 마법처럼 쏘는 중...');

                try {
                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            formUrl: formUrl,
                            answers: extractedAnswers
                        })
                    });

                    setTimeout(() => {
                        setStatus('success');
                        addLog('성공! 설문지의 정답과 배점이 모두 업데이트되었습니다.');
                    }, 2000);
                } catch (err) {
                    setErrorMessage('전송 실패: ' + err.message);
                    setStatus('error');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto space-y-6">
                    {/* 상단 네비게이션 */}
                    <nav className="bg-white rounded-[2.5rem] p-4 pr-8 shadow-sm border border-slate-200 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-4 pl-4">
                            <div className="w-14 h-14 bg-indigo-600 rounded-3xl flex items-center justify-center text-white shadow-xl shadow-indigo-100">
                                <i data-lucide="wand-2" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-900 tracking-tight">OMR MAGICIAN V2</h1>
                                <p className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest leading-none">Open Academy Math Genius</p>
                            </div>
                        </div>
                        
                        <div className="flex flex-1 max-w-2xl gap-3 w-full">
                            <div className="flex-1 bg-slate-50 rounded-2xl flex items-center px-4 border border-slate-100 group focus-within:border-indigo-400 transition-all">
                                <i data-lucide="link" className="w-4 h-4 text-slate-400 mr-2"></i>
                                <input 
                                    type="text" 
                                    placeholder="앱 스크립트 배포 URL"
                                    className="bg-transparent border-none outline-none py-3 text-xs w-full font-medium"
                                    value={gasUrl}
                                    onChange={(e) => setGasUrl(e.target.value)}
                                />
                            </div>
                        </div>
                    </nav>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
                        {/* 설정 및 업로드 패널 */}
                        <div className="xl:col-span-4 space-y-6">
                            {/* 문항수 설정 */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 space-y-4">
                                <h3 className="text-sm font-black text-slate-400 uppercase flex items-center gap-2">
                                    <i data-lucide="settings" className="w-4 h-4"></i> 시험 구성 설정
                                </h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 ml-1">객관식 문항</label>
                                        <div className="flex items-center bg-slate-50 rounded-xl px-3 border border-slate-100">
                                            <input 
                                                type="number" 
                                                className="bg-transparent w-full py-2 font-bold text-indigo-600 outline-none text-sm"
                                                value={choiceCount}
                                                onChange={(e) => setChoiceCount(parseInt(e.target.value) || 0)}
                                            />
                                            <span className="text-[10px] font-bold text-slate-300">개</span>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-500 ml-1">주관식 문항</label>
                                        <div className="flex items-center bg-slate-50 rounded-xl px-3 border border-slate-100">
                                            <input 
                                                type="number" 
                                                className="bg-transparent w-full py-2 font-bold text-rose-600 outline-none text-sm"
                                                value={textCount}
                                                onChange={(e) => setTextCount(parseInt(e.target.value) || 0)}
                                            />
                                            <span className="text-[10px] font-bold text-slate-300">개</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 space-y-6">
                                <section className="space-y-2">
                                    <label className="text-xs font-black text-slate-400 uppercase ml-1">구글 설문지 URL</label>
                                    <input 
                                        type="text" 
                                        placeholder="설문지 편집 모드 주소를 입력하세요"
                                        className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-sm font-medium"
                                        value={formUrl}
                                        onChange={(e) => setFormUrl(e.target.value)}
                                    />
                                </section>

                                <section 
                                    onDragEnter={handleDrag} 
                                    onDragOver={handleDrag} 
                                    onDragleave={handleDrag} 
                                    onDrop={handleDrop}
                                    className={`relative border-4 border-dashed rounded-[2.5rem] p-10 flex flex-col items-center justify-center cursor-pointer transition-all min-h-[250px] ${isDragging ? 'drop-zone-active' : preview ? 'bg-indigo-50/30 border-indigo-200' : 'bg-slate-50 border-slate-200 hover:border-indigo-300'}`}
                                    onClick={() => document.getElementById('fileInput').click()}
                                >
                                    <input id="fileInput" type="file" className="hidden" accept=".pdf,image/*" onChange={(e) => processFile(e.target.files[0])} />
                                    {preview ? (
                                        <div className="text-center animate-in fade-in zoom-in duration-300">
                                            <div className="relative inline-block mb-4">
                                                <i data-lucide={isPdf ? "file-text" : "image"} className={`w-16 h-16 ${isPdf ? 'text-rose-500' : 'text-indigo-500'}`}></i>
                                                <div className="absolute -top-1 -right-1 bg-emerald-500 text-white rounded-full p-1 shadow-lg">
                                                    <i data-lucide="check" className="w-3 h-3"></i>
                                                </div>
                                            </div>
                                            <p className="font-bold text-slate-700 text-sm max-w-[200px] truncate">{file.name}</p>
                                            <p className="text-[10px] text-indigo-500 mt-1 font-black">클릭하여 파일 교체</p>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="w-16 h-16 bg-white rounded-3xl shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition-all duration-300">
                                                <i data-lucide="cloud-upload" className="w-8 h-8 text-indigo-400"></i>
                                            </div>
                                            <p className="text-sm font-black text-slate-600 mb-1">정답지 PDF / 이미지</p>
                                            <p className="text-[11px] text-slate-400 text-center font-medium">여기에 파일을 끌어다 놓으세요</p>
                                        </>
                                    )}
                                </section>

                                <button 
                                    onClick={startScan}
                                    disabled={status === 'scanning' || !file}
                                    className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-lg flex items-center justify-center gap-3 transition-all disabled:bg-slate-200 disabled:text-slate-400 shadow-xl shadow-indigo-100"
                                >
                                    {status === 'scanning' ? <div className="w-6 h-6 border-3 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="sparkles" className="w-6 h-6"></i>}
                                    AI 정답 분석 시작!
                                </button>
                            </div>
                        </div>

                        {/* 결과 출력 패널 */}
                        <div className="xl:col-span-8 space-y-6">
                            <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 flex flex-col min-h-[600px] relative overflow-hidden">
                                <div className="flex items-center justify-between mb-8">
                                    <div>
                                        <h2 className="text-2xl font-black text-slate-900 flex items-center gap-3">
                                            분석 결과 프리뷰
                                            {extractedAnswers.length > 0 && <span className="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-xs font-black tracking-tighter">SUCCESS</span>}
                                        </h2>
                                        <p className="text-xs text-slate-400 mt-1 font-bold italic">배점은 100점 만점에 맞춰 자동 분배되었습니다.</p>
                                    </div>
                                    
                                    {status === 'confirming' && (
                                        <div className="flex items-center gap-2">
                                            <span className="w-3 h-3 bg-indigo-500 rounded-full animate-pulse"></span>
                                            <span className="text-xs font-black text-indigo-500">전송 대기 중</span>
                                        </div>
                                    )}
                                </div>

                                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar mb-8">
                                    {extractedAnswers.length > 0 ? (
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                            {extractedAnswers.map((item) => (
                                                <div key={item.no} className="p-5 bg-slate-50/50 rounded-3xl border border-slate-100 hover:border-indigo-200 hover:bg-white hover:shadow-xl hover:shadow-indigo-50 transition-all group relative overflow-hidden">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className={`px-2 py-0.5 rounded-lg text-[9px] font-black tracking-tighter ${item.type === 'CHOICE' ? 'bg-indigo-100 text-indigo-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            {item.type === 'CHOICE' ? '객관식' : '주관식'}
                                                        </span>
                                                        <span className="text-[10px] font-black text-slate-300">#{item.no}</span>
                                                    </div>
                                                    <div className="text-2xl font-black text-slate-800 mb-1 leading-none group-hover:scale-110 transition-transform origin-left">
                                                        {item.ans}
                                                    </div>
                                                    <div className="text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                                        <i data-lucide="star" className="w-2.5 h-2.5 fill-current"></i> {item.point}점 배점
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4">
                                            <div className="w-24 h-24 bg-slate-50 rounded-[2rem] flex items-center justify-center border border-slate-100">
                                                <i data-lucide="layout-list" className="w-10 h-10 opacity-20"></i>
                                            </div>
                                            <div className="text-center">
                                                <p className="font-black text-slate-400 uppercase tracking-widest text-xs">Ready for Scan</p>
                                                <p className="text-slate-300 text-[11px] font-medium mt-1">파일을 분석하면 정답과 배점이 여기에 마법처럼 나타납니다.</p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {status === 'confirming' && (
                                    <button 
                                        onClick={applyToForm}
                                        className="w-full py-6 bg-emerald-500 hover:bg-emerald-600 text-white rounded-[2rem] font-black text-xl shadow-2xl shadow-emerald-100 flex items-center justify-center gap-3 transition-all active:scale-95 animate-in slide-in-from-bottom-4"
                                    >
                                        <i data-lucide="send" className="w-7 h-7"></i>
                                        구글 설문지에 최종 입력하기
                                    </button>
                                )}

                                {status === 'success' && (
                                    <div className="absolute inset-0 bg-white/95 backdrop-blur-sm flex flex-col items-center justify-center z-50 animate-in fade-in duration-500">
                                        <div className="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mb-6 animate-bounce">
                                            <i data-lucide="party-popper" className="w-12 h-12 text-emerald-600"></i>
                                        </div>
                                        <h4 className="text-3xl font-black text-slate-900 mb-2">마법 완성!</h4>
                                        <p className="font-bold text-slate-500 mb-8 italic">선생님, 이제 퇴근하셔도 좋습니다. 😊</p>
                                        <button onClick={() => setStatus('idle')} className="px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:scale-105 transition-all">새로운 시험 입력하기</button>
                                    </div>
                                )}

                                {status === 'error' && (
                                    <div className="p-6 bg-rose-50 text-rose-600 rounded-3xl border-2 border-rose-100 flex items-center gap-4 animate-in shake duration-500">
                                        <i data-lucide="alert-circle" className="w-10 h-10"></i>
                                        <div>
                                            <p className="font-black">이런! 마법이 꼬였네요.</p>
                                            <p className="text-xs font-medium opacity-80">{errorMessage}</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* 시스템 로그 스테이션 */}
                            <div className="bg-slate-900 rounded-[2.5rem] p-6 shadow-2xl relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-30 transition-opacity">
                                    <i data-lucide="terminal" className="w-20 h-20 text-white"></i>
                                </div>
                                <div className="flex items-center gap-2 mb-4">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none">Live Console Pipeline</span>
                                </div>
                                <div className="h-32 overflow-y-auto space-y-2 custom-scrollbar font-mono text-[11px]">
                                    {logs.length === 0 ? <p className="text-slate-600 italic tracking-tighter">System connected and waiting for input...</p> : logs.map((log, i) => <p key={i} className="text-emerald-400 leading-tight opacity-90"><span className="text-slate-600 mr-2">>>></span> {log}</p>)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 아이콘 실시간 반영
        const observer = new MutationObserver(() => {
            if (window.lucide) lucide.createIcons();
        });
        observer.observe(document.body, { childList: true, subtree: true });
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
