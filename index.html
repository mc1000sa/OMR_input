<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문채의 OMR 자동 입력 마법사</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (JSX Transpiler) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [formUrl, setFormUrl] = useState('');
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [isPdf, setIsPdf] = useState(false);
            const [status, setStatus] = useState('idle'); // idle, scanning, confirming, applying, success, error
            const [extractedAnswers, setExtractedAnswers] = useState([]);
            const [errorMessage, setErrorMessage] = useState('');
            const [logs, setLogs] = useState([]);

            const apiKey = ""; // 실제 환경에서 제공됨

            // 문채 선생님의 배점 규칙 및 정답 추출 프롬프트
            const SYSTEM_PROMPT = `
                당신은 수학 시험 정답지를 분석하는 전문가입니다. 
                파일(PDF 또는 이미지)에서 '빠른 정답' 표를 찾아 정답과 문채 선생님의 배점 규칙을 적용하여 추출하세요.

                [정답 추출 규칙]
                1. 1번~20번은 객관식입니다 (1~5 중 하나).
                2. 21번~25번은 주관식(단답형)입니다. 
                3. **중요: 모든 주관식 답안에서 '단위'를 제거하고 오직 '숫자'만 추출하세요.**
                   - 예: '30년 후' -> '30', '12cm' -> '12', '-12' -> '-12', '24' -> '24'

                [배점 규칙 적용 - 반드시 이 배점을 할당하세요]
                - 1번~5번 : 3점
                - 6번~18번 : 4점
                - 19번~20번 : 5점
                - 21번~22번 : 4점
                - 23번~25번 : 5점

                결과는 반드시 다음과 같은 JSON 형식으로만 응답하세요:
                {
                  "answers": [
                    {"no": 1, "ans": "3", "type": "CHOICE", "point": 3},
                    {"no": 21, "ans": "12", "type": "TEXT", "point": 4}
                  ]
                }
            `;

            const addLog = (msg) => setLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 20)]);

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    setIsPdf(selectedFile.type === 'application/pdf');
                    const reader = new FileReader();
                    reader.onloadend = () => setPreview(reader.result);
                    reader.readAsDataURL(selectedFile);
                }
            };

            const startScan = async () => {
                if (!file) {
                    setErrorMessage('파일을 먼저 업로드해주세요.');
                    return;
                }
                
                setStatus('scanning');
                addLog(`${isPdf ? 'PDF' : '이미지'} 분석을 시작합니다...`);

                try {
                    const base64Data = preview.split(',')[1];
                    const mimeType = isPdf ? 'application/pdf' : file.type;
                    
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "이 파일에서 1번부터 25번까지의 정답을 추출하고 정해진 배점을 할당해줘." },
                                    { inlineData: { mimeType: mimeType, data: base64Data } }
                                ]
                            }],
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        const parsed = JSON.parse(text);
                        setExtractedAnswers(parsed.answers);
                        setStatus('confirming');
                        addLog('정답 및 배점 추출 완료!');
                    } else {
                        throw new Error('데이터를 가져오지 못했습니다.');
                    }
                } catch (err) {
                    setErrorMessage('파일 분석 중 오류가 발생했습니다.');
                    setStatus('error');
                }
            };

            const applyToForm = () => {
                if (!formUrl.includes('docs.google.com/forms')) {
                    setErrorMessage('올바른 구글 설문지 주소를 입력해주세요.');
                    return;
                }

                setStatus('applying');
                addLog('구글 설문에 정답 데이터를 전송하는 중...');

                // 앱 스크립트 서버 함수 호출 (GAS 환경인 경우)
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    google.script.run
                        .withSuccessHandler(() => {
                            setStatus('success');
                            addLog('구글 설문지 업데이트가 완료되었습니다!');
                        })
                        .withFailureHandler((err) => {
                            setErrorMessage(err.message);
                            setStatus('error');
                        })
                        .updateGoogleFormAnswers(formUrl, extractedAnswers);
                } else {
                    // 테스트 환경용 시뮬레이션
                    setTimeout(() => {
                        setStatus('success');
                        addLog('성공! (로컬 테스트 모드)');
                    }, 2000);
                }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 space-y-6">
                    <header className="bg-gradient-to-r from-indigo-700 to-blue-600 rounded-3xl p-8 text-white shadow-xl">
                        <div className="flex items-center gap-3 mb-2">
                            <div className="p-2 bg-white/20 rounded-lg">
                                <i data-lucide="wand-2" className="w-8 h-8"></i>
                            </div>
                            <h1 className="text-3xl font-extrabold tracking-tight">문채의 OMR 마법사</h1>
                        </div>
                        <p className="text-blue-100 font-medium">열린학원 수학 시험지 정답 자동 세팅 (Ver 1.5)</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 space-y-6">
                            <h2 className="text-xl font-bold flex items-center gap-2 text-indigo-700">
                                <span className="bg-indigo-100 w-8 h-8 rounded-full flex items-center justify-center text-sm italic">1</span>
                                정답지 업로드
                            </h2>

                            <div className="space-y-4">
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-500">구글 설문지 편집 주소</label>
                                    <input 
                                        type="text" 
                                        className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 focus:bg-white outline-none transition-all text-sm"
                                        placeholder="https://docs.google.com/forms/d/.../edit"
                                        value={formUrl}
                                        onChange={(e) => setFormUrl(e.target.value)}
                                    />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-slate-500">PDF 또는 이미지 파일</label>
                                    <div 
                                        onClick={() => document.getElementById('fileInput').click()}
                                        className={`border-3 border-dashed rounded-3xl p-8 flex flex-col items-center justify-center cursor-pointer transition-all min-h-[220px] ${preview ? 'bg-indigo-50 border-indigo-200' : 'bg-slate-50 border-slate-200 hover:border-indigo-300'}`}
                                    >
                                        {preview ? (
                                            <div className="text-center">
                                                <i data-lucide={isPdf ? "file-text" : "image"} className={`w-16 h-16 mx-auto mb-3 ${isPdf ? 'text-red-500' : 'text-indigo-500'}`}></i>
                                                <p className="font-bold text-slate-700 truncate max-w-[200px]">{file.name}</p>
                                            </div>
                                        ) : (
                                            <>
                                                <i data-lucide="upload-cloud" className="w-12 h-12 text-slate-300 mb-3"></i>
                                                <p className="text-sm text-slate-400 font-medium text-center">정답지 파일을<br/>여기에 놓거나 클릭하세요</p>
                                            </>
                                        )}
                                        <input id="fileInput" type="file" className="hidden" accept=".pdf,image/*" onChange={handleFileChange} />
                                    </div>
                                </div>
                            </div>

                            <button 
                                onClick={startScan}
                                disabled={status === 'scanning' || !file}
                                className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 disabled:bg-slate-300 flex items-center justify-center gap-2 transition-all active:scale-[0.98]"
                            >
                                {status === 'scanning' ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="refresh-cw" className="w-5 h-5"></i>}
                                <span>마법 분석 시작</span>
                            </button>
                        </div>

                        <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col min-h-[500px]">
                            <h2 className="text-xl font-bold flex items-center gap-2 text-indigo-700 mb-6">
                                <span className="bg-indigo-100 w-8 h-8 rounded-full flex items-center justify-center text-sm italic">2</span>
                                마법 결과 확인
                            </h2>

                            {status === 'idle' && (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-300 space-y-3">
                                    <i data-lucide="file-search" className="w-16 h-16 opacity-20"></i>
                                    <p className="text-center font-medium">분석을 시작하면 정답과<br/>배점이 여기에 표시됩니다.</p>
                                </div>
                            )}

                            {status === 'scanning' && (
                                <div className="flex-1 flex flex-col items-center justify-center space-y-4">
                                    <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                    <p className="font-bold text-indigo-600 animate-pulse">정답지에서 마법 부리는 중...</p>
                                </div>
                            )}

                            {(status === 'confirming' || status === 'applying' || status === 'success') && (
                                <div className="flex-1 flex flex-col h-full">
                                    <div className="flex-1 overflow-y-auto border-2 border-slate-50 rounded-2xl mb-6 hide-scrollbar">
                                        <table className="w-full text-sm">
                                            <thead className="bg-slate-50 sticky top-0">
                                                <tr>
                                                    <th className="p-3 text-left font-bold text-slate-400 uppercase text-[10px]">문항</th>
                                                    <th className="p-3 text-left font-bold text-slate-400 uppercase text-[10px]">정답</th>
                                                    <th className="p-3 text-right font-bold text-slate-400 uppercase text-[10px]">배점</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {extractedAnswers.map((item) => (
                                                    <tr key={item.no} className="hover:bg-indigo-50/50 transition-colors">
                                                        <td className="p-3 font-bold text-slate-400">{item.no}번</td>
                                                        <td className="p-3 font-extrabold text-slate-900">{item.ans}</td>
                                                        <td className="p-3 text-right">
                                                            <span className="px-2 py-1 bg-indigo-50 text-indigo-600 rounded-lg font-bold text-[11px]">
                                                                {item.point}점
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    {status === 'confirming' && (
                                        <button 
                                            onClick={applyToForm}
                                            className="w-full py-5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-emerald-100 flex items-center justify-center gap-2 transition-all active:scale-[0.98]"
                                        >
                                            <i data-lucide="check-circle" className="w-6 h-6"></i>
                                            구글 설문에 정답 입력!
                                        </button>
                                    )}

                                    {status === 'success' && (
                                        <div className="p-6 bg-emerald-50 text-emerald-700 rounded-2xl border-2 border-emerald-100 text-center animate-bounce">
                                            <i data-lucide="party-popper" className="w-12 h-12 mx-auto mb-2"></i>
                                            <p className="font-black text-xl">입력 완료!</p>
                                            <p className="text-sm font-medium opacity-80">수고하셨습니다, 문채 선생님!</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {status === 'error' && (
                                <div className="p-6 bg-red-50 text-red-600 rounded-2xl border-2 border-red-100 text-center space-y-3">
                                    <i data-lucide="alert-triangle" className="w-12 h-12 mx-auto"></i>
                                    <p className="font-bold">{errorMessage}</p>
                                    <button onClick={() => setStatus('idle')} className="text-sm font-bold underline">다시 시도하기</button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="bg-slate-900 rounded-3xl p-6 shadow-2xl">
                        <div className="flex items-center justify-between mb-4">
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                Live System Status
                            </span>
                        </div>
                        <div className="h-24 overflow-y-auto font-mono text-[11px] text-emerald-400 space-y-1 pr-2 custom-scrollbar">
                            {logs.map((log, i) => (
                                <div key={i} className="flex gap-2">
                                    <span className="opacity-30">[{i}]</span>
                                    <span>{log}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Lucide 아이콘 초기화 (DOM 렌더링 후 실행)
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
